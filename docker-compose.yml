# =============================================================
# ARCHITECTURE COMPLÈTE DATA PIPELINE
# Data Source → Kafka → MinIO → Airflow+dbt → Postgres → Metabase
# =============================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.8.0-python3.11
  environment: &airflow-env
    AIRFLOW__CORE__LOAD_EXAMPLES: "False"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://postgres:postgres@postgres:5432/airflow
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
  volumes:
    - ./volumes/dags:/opt/airflow/dags
    - ./volumes/logs:/opt/airflow/logs
    - ./volumes/plugins:/opt/airflow/plugins
  depends_on:
    postgres:
      condition: service_healthy
  networks:
    - data-network

services:

  # ─────────────────────────────────────────
  # DATABASE CENTRALE (Airflow + Metabase)
  # ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: postgres
    hostname: postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./volumes/postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - data-network

  # ─────────────────────────────────────────
  # DATA STREAMING — Kafka + Zookeeper
  # ─────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - ./volumes/zookeeper_data:/var/lib/zookeeper/data
      - ./volumes/zookeeper_log:/var/lib/zookeeper/log
    ports:
      - "2181:2181"
    networks:
      - data-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    restart: always
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - ./volumes/kafka_data:/var/lib/kafka/data
    networks:
      - data-network

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    container_name: kafdrop
    restart: always
    depends_on:
      - kafka
    ports:
      - "9000:9000"
    environment:
      KAFKA_BROKERCONNECT: "kafka:9092"
    networks:
      - data-network

  # ─────────────────────────────────────────
  # DATA STORAGE — MinIO (S3 Compatible)
  # ─────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: always
    ports:
      - "9001:9001"   # Console UI
      - "9002:9000"   # S3 API
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - ./volumes/minio_data:/data
    networks:
      - data-network

  # ─────────────────────────────────────────
  # ORCHESTRATION — Apache Airflow
  # ─────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    command: >
      bash -c "airflow db migrate &&
               airflow users create
                 --username admin
                 --firstname Admin
                 --lastname User
                 --role Admin
                 --email admin@example.com
                 --password password123 || true"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: scheduler

  # ─────────────────────────────────────────
  # VISUALISATION — Metabase
  # ─────────────────────────────────────────
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    hostname: metabase
    restart: always
    ports:
      - "3000:3000"
    environment:
      MB_DB_TYPE: postgres
      MB_DB_DBNAME: metabase
      MB_DB_PORT: 5432
      MB_DB_USER: postgres
      MB_DB_PASS: postgres
      MB_DB_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./volumes/metabase_data:/metabase-data
    networks:
      - data-network

# =============================================================
# Pas de section "volumes:" ici — on utilise uniquement des
# bind mounts (./volumes/xxx) créés par setup.sh
# =============================================================

networks:
  data-network:
    driver: bridge